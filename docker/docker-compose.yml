services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft-test-server
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      - EULA=TRUE
      - ONLINE_MODE=FALSE
      - VERSION=1.20.4
    volumes:
      - minecraft-data:/data

volumes:
  minecraft-data: